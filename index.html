<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organiza tu Evento</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-container">
            <img src="./assets/logo_mr_lo.png" alt="Logo de Mr. Lo" class="logo">
            <h1>Mr. Lo</h1>
        </div>
        <p class="header-parrafo">Empieza a organizar tu evento</p>
    </header>
    <p>Selecciona tu tipo de evento:</p>
    <div class="boton-container">
        <button class="boton">
            <img src="./assets/boda.png" alt="Boda" class="boton-imagen">
            <span class="boton-texto">Boda</span>
            <span class="boton-icono">→</span>
        </button>
        <button class="boton">
            <img src="./assets/corporativo.png" alt="Evento Corporativo" class="boton-imagen">
            <span class="boton-texto">Corporativo</span>
            <span class="boton-icono">→</span>
        </button>
        <button class="boton">
            <img src="./assets/cumpleaños.png" alt="Cumpleaños" class="boton-imagen">
            <span class="boton-texto">Cumpleaños</span>
            <span class="boton-icono">→</span>
        </button>
        <button class="boton">
            <img src="./assets/otros.png" alt="Otros" class="boton-imagen">
            <span class="boton-texto">Otros</span>
            <span class="boton-icono">→</span>
        </button>
    </div>
</body>
</html> juntos!"
